services:
  api:
    build: .
    command: uvicorn src.models.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
      - ./data:/app/data

  streamlit:
    build: .
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env.example
    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
      - ./data:/app/data
    depends_on:
      - api
